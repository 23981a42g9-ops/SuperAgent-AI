<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SuperAgent Supersonic v4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="saleNote">🔥 LOW-COST DISTRICT SALE DETECTED!</div>
    <header>SUPERAGENT AI : SUPERSONIC</header>
    <div id="chatContainer">
        <div id="satisfactionBar" onclick="navigateToNext()">Not Satisfied? Try Next Global Platform ➔</div>
        <div id="chat"></div>
        <div id="controls">
            <button id="micBtn" onclick="startVoice()">🎤</button>
            <input type="text" id="msg" placeholder="Type: 'Cheap shoes', 'Book bus to Vizag', 'Emergency'...">
            <button id="sendBtn" onclick="sendMessage()">EXECUTE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
